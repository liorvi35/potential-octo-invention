services:
  - type: web
    name: chess-api
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: chess.Dockerfile
    dockerContext: .
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
